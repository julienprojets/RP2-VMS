# Redemption page hosted URL used in voucher QR codes.
# Example: https://redeem.yourdomain.com
redemption.hosted.page.base.url=

# API base URL used by hosted redemption page (optional).
# Example: https://api.yourdomain.com
# If empty, local page uses relative paths.
redemption.api.base.url=

# Keep local server enabled for backward compatibility.
redemption.local.server.enabled=true
redemption.local.server.port=8080
